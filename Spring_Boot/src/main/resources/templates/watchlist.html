<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta name="viewport" content="width = device-width, initial-scale = 1, shrink-to-fit = no">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
<link th:href="@{css/style.css}" rel="stylesheet" />
<title>Watchlist App</title>
</head>
<body>
	<nav class="navbar navbar-expand-sm">
				<div class="collapse navbar-collapse" id="navbarSupportedContent">
					<ul class="navbar-nav mr-auto">
						<li class="nav-item"><a class="nav-link" href="/">Home</a></li>
						<li class="nav-item active"><a class="nav-link" href="/watchlist">Watchlist</a></li>
					<li class="nav-item"><a class="nav-link" href="/watchlistItemForm">Submit an item</a></li>
					</ul>
				</div>
			</nav>
		<div class="container">
		<table class="table">
			<thead>
				<tr>
					<th>Title</th>
					<th>Year</th>
					<th>Length</th>
					<th>Rating</th>
					<th>Priority</th>
					<th>Comment</th>
				</tr>
			</thead>
			<tbody>
				<tr id="list" th:each="watchlistItem : ${watchlistItems}">
					<td th:text="${watchlistItem.title}">Avatar</td>
					<td th:text="${watchlistItem.year}">2009</td>
					<td th:text="${watchlistItem.length}">162 min</td>
					<td th:text="${watchlistItem.rating}">7.8</td>
					<td th:text="${watchlistItem.priority}">LOW</td>
					<td th:text="${watchlistItem.comment}">Peter recommended</td>
					<td th:field="${watchlistItem.id}"></td>
					<td><a href="#" class="btn btn-info" role="button"
						th:href="@{/watchlistItemForm(id=${watchlistItem.id})}">Update</a></td>
					<td><form method="POST"
							th:action="@{/watchlist(id=${watchlistItem.id})}">
							<button type="submit" name="submit" value="remove"
								class="btn btn-info">Remove</button>
						</form></td>
				</tr>
			</tbody>
		</table>
	</div>
		<hr />
		<div>
			<div id="watchNumber">
				Number of movies to watch: <span th:text="${numberOfMovies}"></span>
			</div>
		</div>
	<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
	<script
		src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
	<script
		src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</body>
</html>
